<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mobility Roadmap Center - Opérationnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- UTILITAIRES ---
        
        // Parseur CSV simple mais robuste pour vos fichiers Decathlon
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length < 2) return [];
            
            // Détection du séparateur (souvent ',' ou ';' dans Excel FR)
            const firstLine = lines[0];
            const separator = firstLine.includes(';') ? ';' : ',';
            
            const headers = firstLine.split(separator).map(h => h.trim().replace(/"/g, ''));
            
            return lines.slice(1).filter(line => line.trim() !== '').map((line, index) => {
                const values = line.split(separator).map(v => v.trim().replace(/"/g, ''));
                const obj = { id: `csv-${index}` };
                headers.forEach((header, i) => {
                    let val = values[i];
                    // Nettoyage des nombres (ex: "52 333" ou "1 800,00 €")
                    if (header.includes('Qty') || /^\d{4}$/.test(header)) {
                        val = parseInt(val.replace(/\s/g, '').replace(',', '.')) || 0;
                    }
                    obj[header] = val;
                });

                // Mapping intelligent vers notre structure interne
                return {
                    id: obj.id,
                    name: obj['BIKES'] || obj['Bikes name'] || obj['CC Name'] || "Inconnu",
                    sport: obj['Sport'] || obj['Segment'] || "N/A",
                    platform: obj['Plateform'] || obj['PLATFORM ICO'] || "N/A",
                    motor: obj['EBOOST ekit'] || obj['Motor'] || obj['EBOOST (E-KIT) NAME ICO'] || "N/A",
                    battery: obj['Battery'] || "N/A",
                    display: obj['Cockpit/IHM'] || obj['Display'] || "N/A",
                    startYear: parseInt(obj['Start date']?.split('/').pop()) || 2026,
                    endYear: parseInt(obj['End date']?.split('/').pop()) || 2031,
                    q26: obj['Qty 2026'] || obj['2026'] || 0,
                    q27: obj['Qty 2027'] || obj['2027'] || 0,
                    q28: obj['Qty 2028'] || obj['2028'] || 0,
                    q29: obj['Qty 2029'] || obj['2029'] || 0,
                    q30: obj['Qty 2030'] || obj['2030'] || 0,
                    q31: obj['Qty 2031'] || obj['2031'] || 0
                };
            });
        };

        // --- ICÔNES ---
        const IconBike = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>;
        const IconDashboard = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconMap = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconChart = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>;
        const IconUpload = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconSearch = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;

        // --- DONNÉES INITIALES ---
        const INITIAL_DATA = [
            { id: "1", name: "E-FL 900 V2 (LIGHT 16\")", sport: "CITY", platform: "HUB", motor: "Mahle X35", battery: "Inframe 500", display: "OIB eboost Mahle", startYear: 2029, endYear: 2031, q26: 0, q27: 0, q28: 0, q29: 1500, q30: 2500, q31: 3000 },
            { id: "2", name: "E-FL 900 (LIGHT 16\")", sport: "CITY", platform: "HUB", motor: "Mahle X35", battery: "Inframe 500", display: "OIB eboost Mahle", startYear: 2026, endYear: 2029, q26: 2344, q27: 4560, q28: 1365, q29: 1750, q30: 0, q31: 0 },
            { id: "3", name: "Trekking E-ACTV 100 V2", sport: "TREK", platform: "HUB IF", motor: "VRMG92", battery: "inframe360", display: "ERGO 100", startYear: 2026, endYear: 2030, q26: 52333, q27: 0, q28: 45000, q29: 55000, q30: 57000, q31: 0 },
            { id: "4", name: "TREKKING E-EXPL 940", sport: "MTB", platform: "Owuru", motor: "Owuru Ride 3 M", battery: "Battery 370Wh", display: "ERGO 920", startYear: 2026, endYear: 2030, q26: 1173, q27: 0, q28: 1020, q29: 1200, q30: 1300, q31: 0 },
            { id: "5", name: "E FOLD 900 1\"", sport: "FOLD", platform: "HUB seat post", motor: "VRMG92", battery: "Battery seatpost", display: "ERGO500", startYear: 2026, endYear: 2029, q26: 8000, q27: 9000, q28: 10000, q29: 12000, q30: 0, q31: 0 },
        ];

        const YEARS = [2026, 2027, 2028, 2029, 2030, 2031];

        // --- COMPOSANTS DE VUE ---

        const DashboardView = ({ bikes, onUpload }) => {
            const total26 = bikes.reduce((s, b) => s + (b.q26 || 0), 0);
            const segments = [...new Set(bikes.map(b => b.sport))];
            
            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const data = parseCSV(event.target.result);
                    if (data.length > 0) onUpload(data);
                };
                reader.readAsText(file);
            };

            return (
                <div className="space-y-6 animate-fadeIn">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold">Vue d'ensemble</h1>
                        <label className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold cursor-pointer hover:bg-blue-700 transition-all shadow-md">
                            <IconUpload size={18} /> Mettre à jour (CSV)
                            <input type="file" accept=".csv" onChange={handleFile} className="hidden" />
                        </label>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <p className="text-slate-500 text-xs font-bold uppercase">Modèles filtrés</p>
                            <h3 className="text-3xl font-bold mt-1">{bikes.length}</h3>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <p className="text-slate-500 text-xs font-bold uppercase">Volume Total 2026</p>
                            <h3 className="text-3xl font-bold mt-1 text-blue-600">{total26.toLocaleString()}</h3>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <p className="text-slate-500 text-xs font-bold uppercase">Diversité Moteurs</p>
                            <h3 className="text-3xl font-bold mt-1 text-amber-600">{new Set(bikes.map(b => b.motor)).size}</h3>
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-lg font-bold mb-6">Répartition par Sport (Quantités 2026)</h2>
                        <div className="flex flex-col gap-6">
                            <div className="h-10 w-full bg-slate-100 rounded-full flex overflow-hidden shadow-inner">
                                {segments.map((s, i) => {
                                    const vol = bikes.filter(b => b.sport === s).reduce((sum, b) => sum + (b.q26 || 0), 0);
                                    if (vol === 0 || total26 === 0) return null;
                                    const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-purple-500', 'bg-rose-500', 'bg-cyan-500'];
                                    return (
                                        <div key={s} style={{ width: `${(vol/total26)*100}%` }} className={`${colors[i % colors.length]} hover:brightness-110 transition-all`} title={`${s}: ${vol}`} />
                                    );
                                })}
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {segments.map((s, i) => {
                                    const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-purple-500', 'bg-rose-500', 'bg-cyan-500'];
                                    return (
                                        <div key={s} className="flex items-center gap-2 text-sm text-slate-600">
                                            <div className={`w-3 h-3 rounded-full ${colors[i % colors.length]}`} />
                                            <span className="font-medium">{s}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProjectionsView = ({ bikes }) => {
            const [type, setType] = useState('motor');
            
            const aggregated = useMemo(() => {
                const agg = {};
                bikes.forEach(b => {
                    const ref = b[type] || 'Inconnu';
                    if (!agg[ref]) agg[ref] = { ref, q26: 0, q27: 0, q28: 0, q29: 0, q30: 0, q31: 0 };
                    YEARS.forEach(y => {
                        const key = `q${y.toString().slice(-2)}`;
                        agg[ref][key] += b[key] || 0;
                    });
                });
                return Object.values(agg).sort((a,b) => b.q26 - a.q26);
            }, [bikes, type]);

            const max = Math.max(...aggregated.flatMap(d => YEARS.map(y => d[`q${y.toString().slice(-2)}`])));

            return (
                <div className="space-y-6 animate-fadeIn">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold">Projections par Composant</h1>
                        <div className="bg-white p-1 rounded-xl shadow-sm border border-slate-200 flex">
                            {['motor', 'battery', 'display'].map(t => (
                                <button key={t} onClick={() => setType(t)} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${type === t ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    {t === 'motor' ? 'Moteurs' : t === 'battery' ? 'Batteries' : 'HMI'}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div className="h-64 flex items-end gap-4 mb-10 border-b border-slate-100 pb-2">
                            {YEARS.map(y => {
                                const key = `q${y.toString().slice(-2)}`;
                                const totalYear = aggregated.reduce((s, d) => s + d[key], 0);
                                const h = max ? (totalYear / (max * 1.5)) * 100 : 0;
                                return (
                                    <div key={y} className="flex-1 flex flex-col items-center gap-2 group relative">
                                        <div className="absolute -top-8 text-[10px] font-bold text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity">{totalYear.toLocaleString()}</div>
                                        <div className="w-full bg-blue-500/10 rounded-t-xl overflow-hidden flex flex-col justify-end h-full">
                                            <div className="w-full bg-blue-600 rounded-t-lg transition-all duration-700" style={{ height: `${Math.max(h, 2)}%` }} />
                                        </div>
                                        <span className="text-xs font-bold text-slate-400">{y}</span>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead>
                                    <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                        <th className="py-4 px-2">Référence</th>
                                        {YEARS.map(y => <th key={y} className="py-4 px-2 text-right">{y}</th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {aggregated.map((row, i) => (
                                        <tr key={i} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                            <td className="py-4 px-2 font-bold text-slate-700">{row.ref}</td>
                                            {YEARS.map(y => <td key={y} className="py-4 px-2 text-right text-sm text-slate-600 font-medium">{row[`q${y.toString().slice(-2)}`].toLocaleString()}</td>)}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- APPLICATION PRINCIPALE ---

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [bikesData, setBikesData] = useState(INITIAL_DATA);

            // Fonction de recherche fonctionnelle
            const filteredBikes = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return bikesData.filter(b => 
                    b.name.toLowerCase().includes(term) ||
                    b.motor.toLowerCase().includes(term) ||
                    b.sport.toLowerCase().includes(term) ||
                    b.battery.toLowerCase().includes(term)
                );
            }, [bikesData, searchTerm]);

            return (
                <div className="flex min-h-screen bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-slate-400 flex flex-col fixed h-full z-20">
                        <div className="p-8 flex items-center gap-3 text-white">
                            <div className="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/40"><IconBike size={24} /></div>
                            <span className="font-black text-xl tracking-tighter italic">E-BOOST</span>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-1">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: IconDashboard },
                                { id: 'projections', label: 'Projections', icon: IconChart },
                                { id: 'roadmap', label: 'Roadmap', icon: IconMap },
                                { id: 'list', label: 'Base Vélos', icon: IconBike }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${activeTab === item.id ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <item.icon /> {item.label}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <div className="flex-1 ml-64 flex flex-col">
                        <header className="h-20 bg-white border-b border-slate-200 px-10 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                            <div className="relative w-96 group">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors"><IconSearch /></div>
                                <input 
                                    type="text" 
                                    placeholder="Chercher un vélo, un moteur, un sport..." 
                                    className="w-full bg-slate-100 border-none rounded-2xl pl-12 pr-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-sm font-bold text-slate-800">Utilisateur Decathlon</p>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Roadmap Manager</p>
                                </div>
                                <div className="w-10 h-10 bg-blue-100 rounded-full border border-blue-200" />
                            </div>
                        </header>

                        <main className="p-10 max-w-7xl w-full mx-auto">
                            {activeTab === 'dashboard' && <DashboardView bikes={filteredBikes} onUpload={setBikesData} />}
                            {activeTab === 'projections' && <ProjectionsView bikes={filteredBikes} />}
                            {activeTab === 'roadmap' && (
                                <div className="space-y-6 animate-fadeIn">
                                    <h1 className="text-2xl font-bold">Calendrier Roadmap</h1>
                                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                                        <div className="grid grid-cols-8 gap-4 mb-6 border-b border-slate-50 pb-4 text-[10px] font-black text-slate-400 uppercase">
                                            <div className="col-span-2">Projet</div>
                                            {YEARS.map(y => <div key={y} className="text-center">{y}</div>)}
                                        </div>
                                        <div className="space-y-4">
                                            {filteredBikes.map(b => (
                                                <div key={b.id} className="grid grid-cols-8 gap-4 items-center group">
                                                    <div className="col-span-2">
                                                        <p className="font-bold text-slate-800 truncate leading-tight">{b.name}</p>
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase">{b.sport}</span>
                                                    </div>
                                                    <div className="col-span-6 h-6 bg-slate-50 rounded-lg relative overflow-hidden">
                                                        <div 
                                                            className="absolute h-full bg-blue-500 rounded-lg opacity-20 border border-blue-500 group-hover:opacity-40 transition-opacity"
                                                            style={{
                                                                left: `${(YEARS.indexOf(b.startYear)/6)*100}%`,
                                                                width: `${((Math.min(YEARS.indexOf(b.endYear), 5) - YEARS.indexOf(b.startYear) + 1)/6)*100}%`
                                                            }}
                                                        />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                            {activeTab === 'list' && (
                                <div className="space-y-6 animate-fadeIn">
                                    <h1 className="text-2xl font-bold">Base Vélos Complète</h1>
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase">
                                                <tr>
                                                    <th className="py-4 px-6">Vélo</th>
                                                    <th className="py-4 px-6">E-Kit Moteur</th>
                                                    <th className="py-4 px-6">Batterie</th>
                                                    <th className="py-4 px-6">Display</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {filteredBikes.map(b => (
                                                    <tr key={b.id} className="border-b border-slate-50 hover:bg-blue-50/30 transition-colors">
                                                        <td className="py-4 px-6"><p className="font-bold text-slate-800">{b.name}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{b.sport} • {b.platform}</p></td>
                                                        <td className="py-4 px-6 text-sm font-medium text-slate-600">{b.motor}</td>
                                                        <td className="py-4 px-6 text-sm text-slate-500">{b.battery}</td>
                                                        <td className="py-4 px-6 text-sm text-slate-500">{b.display}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</body>
</html>
