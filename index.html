<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mobility Roadmap Center - Opérationnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- UTILITAIRES ---
        
        const parseCSV = (text) => {
            try {
                // Sécurité : si on reçoit du HTML (ex: page de connexion Google), on rejette
                if (text.trim().toLowerCase().startsWith('<!doctype') || text.trim().toLowerCase().startsWith('<html')) {
                    throw new Error("Le lien fourni renvoie une page Web sécurisée et non un CSV. Assurez-vous que le Google Sheet est partagé publiquement.");
                }

                const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
                if (lines.length < 2) return [];
                
                const firstLine = lines[0];
                const separator = firstLine.includes(';') ? ';' : ',';
                // Nettoyage des headers (suppression des BOM, guillemets et espaces)
                const headers = firstLine.split(separator).map(h => h.trim().replace(/^[\uFEFF\u00EF\u00BB\u00BF]+/, '').replace(/"/g, ''));
                
                const results = lines.slice(1).map((line, index) => {
                    const values = line.split(separator).map(v => v.trim().replace(/"/g, ''));
                    const obj = {};
                    headers.forEach((header, i) => {
                        let val = values[i] || "";
                        // Nettoyage spécifique pour les quantités et années (gère les espaces insécables "52 333")
                        if (header.toLowerCase().includes('qty') || header.toLowerCase().includes('20') || /^\d{4}$/.test(header)) {
                            // Supprime tous les espaces (normaux, insécables, fins) et remplace la virgule
                            const cleanVal = val.replace(/[\s\u00A0\u202F]/g, '').replace(',', '.');
                            val = Math.round(parseFloat(cleanVal)) || 0;
                        }
                        obj[header] = val;
                    });

                    // Mapping robuste basé sur tes fichiers réels (Decathlon)
                    return {
                        id: `csv-${index}-${Date.now()}`,
                        name: obj['BIKES'] || obj['Bikes name'] || obj['CC Name'] || obj['Bikes name\nEcosystem name'] || "Modèle Inconnu",
                        sport: obj['Sport'] || obj['Segment'] || "N/A",
                        platform: obj['Plateform'] || obj['PLATFORM ICO'] || obj['Plateforme'] || "N/A",
                        motor: obj['EBOOST ekit'] || obj['Motor'] || obj['EBOOST (E-KIT) NAME ICO'] || obj['EBOOST (E-KIT) NAME\nICO'] || "N/A",
                        battery: obj['Battery'] || obj['BATTERY'] || "N/A",
                        display: obj['Cockpit/IHM'] || obj['Display'] || obj['DISPLAY'] || "N/A",
                        startYear: parseInt(obj['Start date']?.toString().split('/').pop()) || 2026,
                        endYear: parseInt(obj['End date']?.toString().split('/').pop()) || 2031,
                        q26: obj['Qty 2026'] || obj['2026'] || 0,
                        q27: obj['Qty 2027'] || obj['2027'] || 0,
                        q28: obj['Qty 2028'] || obj['2028'] || 0,
                        q29: obj['Qty 2029'] || obj['2029'] || 0,
                        q30: obj['Qty 2030'] || obj['2030'] || 0,
                        q31: obj['Qty 2031'] || obj['2031'] || 0
                    };
                });
                return results;
            } catch (err) {
                console.error("Erreur de parsing:", err);
                throw err; // On remonte l'erreur pour l'afficher à l'utilisateur
            }
        };

        // --- ICÔNES ---
        const IconBike = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>;
        const IconDashboard = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconMap = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconChart = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>;
        const IconUpload = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconSearch = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconRefresh = ({ size = 20, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconDatabase = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;

        const YEARS = [2026, 2027, 2028, 2029, 2030, 2031];

        // --- COMPOSANTS DE VUE ---

        const DashboardView = ({ bikes, onUpload }) => {
            const [status, setStatus] = useState(null);
            const [sheetUrl, setSheetUrl] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const total26 = bikes.reduce((s, b) => s + (parseInt(b.q26) || 0), 0);
            
            // Fonction d'import de fichier local CSV
            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const content = event.target.result;
                        const data = parseCSV(content);
                        if (data && data.length > 0) {
                            onUpload(data);
                            setStatus({ type: 'success', msg: `${data.length} vélos importés avec succès depuis le fichier local !` });
                        } else {
                            setStatus({ type: 'error', msg: "Format de fichier non reconnu ou tableau vide." });
                        }
                    } catch (err) {
                        setStatus({ type: 'error', msg: err.message || "Erreur lors du traitement du fichier." });
                    }
                };
                reader.onerror = () => setStatus({ type: 'error', msg: "Erreur lors de la lecture du fichier par le navigateur." });
                reader.readAsText(file, 'UTF-8'); 
            };

            // Fonction de synchronisation avec Google Sheets
            const handleSheetSync = async () => {
                if (!sheetUrl.trim()) {
                    setStatus({ type: 'error', msg: "Veuillez entrer un lien Google Sheets." });
                    return;
                }

                setIsLoading(true);
                setStatus(null);

                try {
                    // Conversion de l'URL Google Sheets vers l'URL d'exportation CSV
                    let fetchUrl = sheetUrl.trim();
                    if (fetchUrl.includes('docs.google.com/spreadsheets')) {
                        // Remplacer /edit... par /export?format=csv
                        fetchUrl = fetchUrl.replace(/\/edit.*$/, '/export?format=csv');
                    }

                    const response = await fetch(fetchUrl);
                    
                    if (!response.ok) {
                        throw new Error(`Erreur réseau (${response.status}). Le lien est-il bien public ?`);
                    }

                    const text = await response.text();
                    const data = parseCSV(text);
                    
                    if (data && data.length > 0) {
                        onUpload(data);
                        setStatus({ type: 'success', msg: `${data.length} vélos synchronisés avec succès depuis Google Sheets !` });
                    } else {
                        setStatus({ type: 'error', msg: "Aucune donnée trouvée dans le Google Sheet ou format non reconnu." });
                    }
                } catch (err) {
                    setStatus({ type: 'error', msg: "Échec de la synchronisation : " + (err.message || "Vérifiez que le lien est bien partagé à 'Tous ceux qui ont le lien'.") });
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="space-y-6 animate-fadeIn">
                    
                    {/* Alerte Visuelle (Succès ou Erreur) */}
                    {status && (
                        <div className={`p-4 rounded-xl flex justify-between items-center shadow-sm ${status.type === 'success' ? 'bg-emerald-100 text-emerald-800 border border-emerald-200' : 'bg-rose-100 text-rose-800 border border-rose-200'}`}>
                            <span className="font-bold text-sm flex items-center gap-2">
                                {status.type === 'success' ? '✅' : '⚠️'} {status.msg}
                            </span>
                            <button onClick={() => setStatus(null)} className="hover:opacity-70 transition-opacity">✕</button>
                        </div>
                    )}
                    
                    <h1 className="text-2xl font-bold mb-6">Tableau de bord</h1>

                    {/* Bloc Source de Données */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                            <IconDatabase size={20} className="text-blue-500" />
                            Connecter une source de données
                        </h2>
                        
                        <div className="flex flex-col xl:flex-row gap-6 items-center">
                            {/* Option 1: Google Sheets */}
                            <div className="flex-1 w-full bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Synchronisation Google Sheets</label>
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="Ex: https://docs.google.com/spreadsheets/d/1abc.../edit" 
                                        className="flex-1 bg-white border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                        value={sheetUrl}
                                        onChange={(e) => setSheetUrl(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSheetSync()}
                                    />
                                    <button 
                                        onClick={handleSheetSync}
                                        disabled={isLoading}
                                        className="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-700 transition-all flex items-center gap-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap"
                                    >
                                        <IconRefresh size={16} className={isLoading ? "animate-spin" : ""} />
                                        {isLoading ? 'Synchro...' : 'Synchroniser'}
                                    </button>
                                </div>
                                <p className="text-xs text-slate-400 mt-2">Le lien doit être configuré sur <b>"Tous ceux qui ont le lien peuvent lire"</b>.</p>
                            </div>

                            <div className="text-xs font-bold text-slate-300 uppercase">Ou</div>

                            {/* Option 2: Upload CSV Local */}
                            <div className="w-full xl:w-auto flex flex-col justify-center">
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 text-center xl:text-left">Import Manuel</label>
                                <label className="flex items-center justify-center gap-2 bg-slate-800 text-white px-6 py-2 rounded-lg text-sm font-bold cursor-pointer hover:bg-slate-700 transition-all shadow-sm whitespace-nowrap h-[38px]">
                                    <IconUpload size={16} /> Fichier CSV local
                                    <input type="file" accept=".csv" onChange={handleFile} className="hidden" />
                                </label>
                            </div>
                        </div>
                    </div>

                    {/* KPIs */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-6 opacity-5"><IconBike size={80} /></div>
                            <p className="text-slate-500 text-xs font-bold uppercase tracking-wider">Modèles actifs</p>
                            <h3 className="text-4xl font-black text-slate-800 mt-2">{bikes.length}</h3>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-6 opacity-5"><IconChart size={80} /></div>
                            <p className="text-slate-500 text-xs font-bold uppercase tracking-wider">Volume Total 2026</p>
                            <h3 className="text-4xl font-black text-blue-600 mt-2">{total26.toLocaleString()}</h3>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-6 opacity-5"><IconDatabase size={80} /></div>
                            <p className="text-slate-500 text-xs font-bold uppercase tracking-wider">E-Kits distincts</p>
                            <h3 className="text-4xl font-black text-amber-500 mt-2">{new Set(bikes.map(b => b.motor)).size}</h3>
                        </div>
                    </div>

                    {/* Chart Repartition */}
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-lg font-bold mb-6">Répartition des volumes par Segment (2026)</h2>
                        <div className="flex flex-col gap-6">
                            {total26 > 0 ? (
                                <div className="h-10 w-full bg-slate-100 rounded-full flex overflow-hidden shadow-inner">
                                    {[...new Set(bikes.map(b => b.sport))].map((s, i) => {
                                        const vol = bikes.filter(b => b.sport === s).reduce((sum, b) => sum + (parseInt(b.q26) || 0), 0);
                                        if (vol <= 0) return null;
                                        const colors = ['bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-purple-500', 'bg-rose-500', 'bg-cyan-500'];
                                        return (
                                            <div key={s} style={{ width: `${(vol/total26)*100}%` }} className={`${colors[i % colors.length]} hover:brightness-110 transition-all`} title={`${s}: ${vol.toLocaleString()}`} />
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="h-10 w-full bg-slate-50 rounded-full flex items-center justify-center text-slate-400 text-sm italic border border-dashed border-slate-200">Aucun volume à afficher pour 2026</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [bikesData, setBikesData] = useState([]);

            const filteredBikes = useMemo(() => {
                const term = searchTerm.trim().toLowerCase();
                if (!term) return bikesData;
                return bikesData.filter(b => 
                    [b.name, b.motor, b.sport, b.platform, b.display]
                    .some(field => (field || "").toString().toLowerCase().includes(term))
                );
            }, [bikesData, searchTerm]);

            return (
                <div className="flex min-h-screen bg-slate-50">
                    <aside className="w-64 bg-slate-900 text-slate-400 flex flex-col fixed h-full z-20">
                        <div className="p-8 flex items-center gap-3 text-white">
                            <div className="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/40"><IconBike size={24} /></div>
                            <span className="font-black text-xl tracking-tighter italic uppercase">E-Boost</span>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-1">
                            {['dashboard', 'projections', 'roadmap', 'list'].map(id => {
                                const labels = { dashboard: 'Dashboard', projections: 'Projections', roadmap: 'Roadmap', list: 'Base Vélos' };
                                return (
                                    <button key={id} onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${activeTab === id ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                        <span>{labels[id]}</span>
                                    </button>
                                );
                            })}
                        </nav>
                    </aside>

                    <div className="flex-1 ml-64 flex flex-col">
                        <header className="h-20 bg-white border-b border-slate-200 px-10 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                            <div className="relative w-96">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><IconSearch /></div>
                                <input 
                                    type="text" 
                                    placeholder="Chercher un vélo, un moteur..." 
                                    className="w-full bg-slate-100 border-none rounded-2xl pl-12 pr-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center gap-4">
                                <p className="text-sm font-bold text-slate-800">BALLEE02</p>
                                <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center font-bold text-blue-600">BT</div>
                            </div>
                        </header>

                        <main className="p-10 max-w-7xl w-full mx-auto">
                            {bikesData.length === 0 && activeTab !== 'dashboard' ? (
                                <div className="text-center py-20 animate-fadeIn">
                                    <IconDatabase size={48} className="mx-auto text-slate-300 mb-4" />
                                    <h2 className="text-xl font-bold text-slate-500">Aucune donnée chargée.</h2>
                                    <p className="text-slate-400 mt-2">Retournez sur le Dashboard pour connecter un fichier ou un Google Sheet.</p>
                                    <button onClick={() => setActiveTab('dashboard')} className="mt-6 text-blue-600 font-bold hover:underline">Aller au Dashboard</button>
                                </div>
                            ) : (
                                <>
                                    {activeTab === 'dashboard' && <DashboardView bikes={filteredBikes} onUpload={setBikesData} />}
                                    
                                    {activeTab === 'list' && (
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-fadeIn">
                                            <div className="p-6 border-b border-slate-100">
                                                <h2 className="text-lg font-bold text-slate-800">Base Vélos Complète</h2>
                                            </div>
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-wider">
                                                    <tr>
                                                        <th className="py-4 px-6">Vélo</th>
                                                        <th className="py-4 px-6">E-Kit (Moteur)</th>
                                                        <th className="py-4 px-6">Batterie</th>
                                                        <th className="py-4 px-6">Display / HMI</th>
                                                        <th className="py-4 px-6">SOP</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {filteredBikes.map(b => (
                                                        <tr key={b.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                            <td className="py-4 px-6"><p className="font-bold text-slate-800">{b.name}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{b.sport} • {b.platform}</p></td>
                                                            <td className="py-4 px-6 text-sm font-medium text-slate-600">{b.motor}</td>
                                                            <td className="py-4 px-6 text-sm text-slate-500">{b.battery}</td>
                                                            <td className="py-4 px-6 text-sm text-slate-500">{b.display}</td>
                                                            <td className="py-4 px-6"><span className="px-3 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold rounded-full uppercase">{b.startYear}</span></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}

                                    {activeTab === 'projections' && (
                                        <div className="space-y-6 animate-fadeIn">
                                            <div className="flex justify-between items-center">
                                                <h1 className="text-2xl font-bold">Projections Composants</h1>
                                            </div>
                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                                                <IconChart size={48} className="text-blue-200 mb-4" />
                                                <h3 className="font-bold text-lg text-slate-700">Vue en cours de développement</h3>
                                                <p className="text-slate-500 mt-2">Ce module affiche l'agrégation de toutes les quantités (Moteurs, Batteries, Écrans) des vélos listés dans votre Google Sheet.</p>
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'roadmap' && (
                                        <div className="space-y-6 animate-fadeIn">
                                            <h1 className="text-2xl font-bold">Calendrier Roadmap (SOP à EOP)</h1>
                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                                                <div className="grid grid-cols-8 gap-4 mb-6 border-b border-slate-50 pb-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">
                                                    <div className="col-span-2">Modèle de vélo</div>
                                                    {YEARS.map(y => <div key={y} className="text-center">{y}</div>)}
                                                </div>
                                                <div className="space-y-4">
                                                    {filteredBikes.map(b => (
                                                        <div key={b.id} className="grid grid-cols-8 gap-4 items-center group">
                                                            <div className="col-span-2">
                                                                <p className="font-bold text-slate-800 truncate leading-tight" title={b.name}>{b.name}</p>
                                                                <span className="text-[10px] font-bold text-slate-400 uppercase">{b.sport}</span>
                                                            </div>
                                                            <div className="col-span-6 h-6 bg-slate-50 rounded-lg relative overflow-hidden">
                                                                <div 
                                                                    className="absolute h-full bg-blue-500 rounded-lg opacity-20 border border-blue-500 group-hover:opacity-40 transition-opacity"
                                                                    style={{
                                                                        left: `${Math.max(0, (YEARS.indexOf(b.startYear)/6)*100)}%`,
                                                                        width: `${Math.max(0, ((Math.min(YEARS.indexOf(b.endYear), 5) - Math.max(0, YEARS.indexOf(b.startYear)) + 1)/6)*100)}%`
                                                                    }}
                                                                />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</body>
</html>
