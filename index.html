<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- MOTEUR INTELLIGENT DE TRAITEMENT DES DONNÉES ---
        const processBikesData = (allRows) => {
            let headerRowIndex = 0;
            let bestScore = 0;
            
            // Trouver la vraie ligne d'en-tête
            for (let i = 0; i < Math.min(10, allRows.length); i++) {
                const rowStr = allRows[i].join(' ').toLowerCase();
                let score = 0;
                if (rowStr.includes('sport') || rowStr.includes('segment')) score++;
                if (rowStr.includes('qty') || rowStr.includes('qties') || rowStr.includes('2026') || rowStr.includes('2027')) score++;
                if (rowStr.includes('name') || rowStr.includes('modèle') || rowStr.includes('component')) score++;
                
                if (score > bestScore) {
                    bestScore = score;
                    headerRowIndex = i;
                }
            }

            const headers = allRows[headerRowIndex].map(h => (h || "").toLowerCase().trim().replace(/[\n\r]/g, ' '));
            const dataRows = allRows.slice(headerRowIndex + 1);

            const findColIndex = (keywords) => {
                for (let kw of keywords) {
                    const idx = headers.findIndex(h => h === kw);
                    if (idx !== -1) return idx;
                }
                for (let kw of keywords) {
                    const idx = headers.findIndex(h => h.includes(kw));
                    if (idx !== -1) return idx;
                }
                return -1;
            };

            const idxName = findColIndex(['cc name', 'bikes name', 'eboost name', 'bike', 'vélo', 'ecosystem', 'modèle', 'cc']);
            const idxSport = findColIndex(['segment', 'sport', 'famille']);
            const idxProjectManager = findColIndex(['project manager', 'chef de projet', 'manager']);
            const idxEkit = findColIndex(['platform ico', 'platform', 'plateforme', 'eboost ekit', 'ekit', 'e-kit']);
            const idxMotorCol = findColIndex(['motor', 'moteur']); 
            const idxBatteryCol = findColIndex(['battery', 'batterie', 'energy']);
            const idxDisplayCol = findColIndex(['display', 'cockpit', 'ihm', 'hmi', 'screen']);
            const idxDriverCol = findColIndex(['driver', 'controller']);
            const idxStartDate = findColIndex(['start date', 'start', 'sop', 'début', 'kickoff']); 
            const idxEndDate = findColIndex(['end date', 'end', 'eop', 'fin']);
            
            const idxCompType = findColIndex(['component type', 'type de composant']);
            const idxCompName = findColIndex(['component name', 'nom du composant', 'compo to consider']);

            const yearIndexes = {};
            [2026, 2027, 2028, 2029, 2030, 2031].forEach(year => {
                let idx = headers.findIndex(h => h.includes(year.toString()) && !h.includes('-'));
                if (idx !== -1) yearIndexes[year] = idx;
            });

            const isPivoted = idxCompType !== -1 && idxCompName !== -1;
            
            const getVal = (row, idx, fallback = "N/A") => {
                if (idx === -1 || row[idx] === undefined) return fallback;
                const val = row[idx].trim();
                return val === '' || val === '#N/A' || val === '0' ? fallback : val;
            };

            const getNum = (row, idx) => {
                if (idx === -1 || row[idx] === undefined) return 0;
                const cleanVal = row[idx].toString().replace(/[\s\u00A0\u202F€$]/g, '').replace(',', '.');
                return Math.round(parseFloat(cleanVal)) || 0;
            };

            const parseExactDate = (str, defaultYear, isEnd) => {
                if (!str || str === "N/A" || str === "Exist but No quantity") {
                    return new Date(defaultYear, isEnd ? 11 : 0, isEnd ? 31 : 1).toISOString();
                }
                const parts = str.split(/[-/]/);
                if (parts.length === 3) {
                    let p1 = parseInt(parts[0], 10);
                    let p2 = parseInt(parts[1], 10);
                    let p3 = parseInt(parts[2], 10);
                    if (p3 < 100) p3 += 2000;
                    
                    let day = p1, month = p2, year = p3;
                    if (month > 12) {
                        day = p2; month = p1;
                    }
                    
                    const date = new Date(year, month - 1, day);
                    if (!isNaN(date.getTime())) return date.toISOString();
                }
                return new Date(defaultYear, isEnd ? 11 : 0, isEnd ? 31 : 1).toISOString();
            };

            if (isPivoted) {
                const bikesMap = {};
                dataRows.forEach((row, index) => {
                    const bikeName = getVal(row, idxName);
                    if (bikeName === "N/A") return;

                    if (!bikesMap[bikeName]) {
                        bikesMap[bikeName] = {
                            id: `bike-${index}-${Date.now()}`,
                            name: bikeName,
                            sport: getVal(row, idxSport),
                            projectManager: getVal(row, idxProjectManager),
                            ekit: 'N/A', motor: 'N/A', battery: 'N/A', display: 'N/A', driver: 'N/A',
                            startRaw: getVal(row, idxStartDate), endRaw: getVal(row, idxEndDate),
                            parsedStart: parseExactDate(getVal(row, idxStartDate), 2026, false),
                            parsedEnd: parseExactDate(getVal(row, idxEndDate), 2031, true),
                            q26: 0, q27: 0, q28: 0, q29: 0, q30: 0, q31: 0
                        };
                    }

                    const b = bikesMap[bikeName];
                    const compType = getVal(row, idxCompType).toLowerCase();
                    const compName = getVal(row, idxCompName);

                    if (compName !== "N/A") {
                        if (compType.includes('battery') || compType.includes('energy')) b.battery = compName;
                        if (compType.includes('ekit') || compType.includes('assistance') || compType.includes('platform')) b.ekit = compName;
                        if (compType.includes('motor') || compType.includes('moteur')) b.motor = compName;
                        if (compType.includes('hmi') || compType.includes('display') || compType.includes('cockpit')) b.display = compName;
                        if (compType.includes('driver') || compType.includes('controller')) b.driver = compName;
                    }

                    [2026, 2027, 2028, 2029, 2030, 2031].forEach(y => {
                        const val = getNum(row, yearIndexes[y]);
                        b[`q${y.toString().slice(-2)}`] = Math.max(b[`q${y.toString().slice(-2)}`], val);
                    });
                });
                return Object.values(bikesMap).filter(b => b.q26 > 0 || b.q27 > 0 || b.q28 > 0 || b.q29 > 0 || b.q30 > 0 || b.q31 > 0 || b.ekit !== "N/A" || b.motor !== "N/A");
            
            } else {
                return dataRows.map((row, index) => {
                    const startR = getVal(row, idxStartDate, "");
                    const endR = getVal(row, idxEndDate, "");
                    
                    return {
                        id: `bike-${index}-${Date.now()}`,
                        name: getVal(row, idxName, "Modèle Inconnu"),
                        sport: getVal(row, idxSport),
                        projectManager: getVal(row, idxProjectManager, "N/A"),
                        ekit: getVal(row, idxEkit),
                        motor: getVal(row, idxMotorCol),
                        battery: getVal(row, idxBatteryCol),
                        display: getVal(row, idxDisplayCol),
                        driver: getVal(row, idxDriverCol),
                        startRaw: startR,
                        endRaw: endR,
                        parsedStart: parseExactDate(startR, 2026, false),
                        parsedEnd: parseExactDate(endR, 2031, true),
                        q26: getNum(row, yearIndexes[2026]),
                        q27: getNum(row, yearIndexes[2027]),
                        q28: getNum(row, yearIndexes[2028]),
                        q29: getNum(row, yearIndexes[2029]),
                        q30: getNum(row, yearIndexes[2030]),
                        q31: getNum(row, yearIndexes[2031])
                    };
                }).filter(b => b.name !== "Modèle Inconnu" && (b.q26 > 0 || b.q27 > 0 || b.q28 > 0 || b.q29 > 0 || b.q30 > 0 || b.q31 > 0 || b.ekit !== "N/A" || b.motor !== "N/A"));
            }
        };

        const parseCSV = (text) => {
            try {
                if (text.trim().toLowerCase().startsWith('<!doctype') || text.trim().toLowerCase().startsWith('<html')) {
                    throw new Error("Erreur: Le fichier reçu est une page Web HTML. Assurez-vous d'avoir téléchargé un CSV.");
                }

                const firstLinePreview = text.split('\n')[0] || "";
                const secondLinePreview = text.split('\n')[1] || "";
                const checkText = firstLinePreview + secondLinePreview;
                const separator = (checkText.match(/;/g) || []).length > (checkText.match(/,/g) || []).length ? ';' : ',';

                const result = [];
                let currentLine = [];
                let currentCell = '';
                let inQuotes = false;

                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];

                    if (inQuotes) {
                        if (char === '"') {
                            if (nextChar === '"') { currentCell += '"'; i++; } 
                            else { inQuotes = false; }
                        } else { currentCell += char; }
                    } else {
                        if (char === '"') { inQuotes = true; } 
                        else if (char === separator) { currentLine.push(currentCell); currentCell = ''; } 
                        else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                            if (char === '\r') i++;
                            currentLine.push(currentCell);
                            if (currentLine.join('').trim() !== '') result.push(currentLine);
                            currentLine = []; currentCell = '';
                        } else if (char !== '\r') { currentCell += char; }
                    }
                }
                if (currentCell !== '' || currentLine.length > 0) {
                    currentLine.push(currentCell);
                    if (currentLine.join('').trim() !== '') result.push(currentLine);
                }

                if (result.length < 2) throw new Error("Le fichier est vide ou mal formaté.");
                return processBikesData(result);

            } catch (err) {
                console.error("Erreur parseCSV:", err);
                throw err;
            }
        };

        // --- ICÔNES ---
        const IconBike = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>;
        const IconDashboard = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconMap = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
        const IconChart = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>;
        const IconUpload = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconDownload = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconSearch = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconDatabase = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const IconArrowRight = ({ size = 24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconClose = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconCpu = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>;
        const IconSettings = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconBattery = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>;
        const IconMonitor = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h8"/><path d="M10 19v-3.96 3.15"/><path d="M7 19h5"/><rect width="6" height="10" x="16" y="12" rx="2"/></svg>;
        const IconDriver = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const IconSort = ({ direction }) => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`inline-block ml-1 transition-transform ${direction === 'descending' ? 'rotate-180' : ''}`}>
                <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
        );
        const IconChevronDown = ({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        const YEARS = [2026, 2027, 2028, 2029, 2030, 2031];

        // --- COMPOSANT MULTI-SELECT DROPDOWN ---
        const MultiSelect = ({ options, selectedOptions, onChange, placeholder }) => {
            const [isOpen, setIsOpen] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const toggleOption = (option) => {
                let newSelected;
                if (selectedOptions.includes(option)) {
                    newSelected = selectedOptions.filter(o => o !== option);
                } else {
                    newSelected = [...selectedOptions, option];
                }
                onChange(newSelected);
            };

            const toggleAll = () => {
                if (selectedOptions.length === options.length) {
                    onChange([]);
                } else {
                    onChange([...options]);
                }
            };

            let displayText = placeholder;
            if (selectedOptions.length > 0) {
                if (selectedOptions.length === 1) {
                    displayText = selectedOptions[0].length > 15 ? selectedOptions[0].substring(0, 15) + '...' : selectedOptions[0];
                } else if (selectedOptions.length === options.length && options.length > 0) {
                    displayText = `Tous (${options.length})`;
                } else {
                    displayText = `${selectedOptions.length} sél.`;
                }
            }

            const isAllSelected = selectedOptions.length === options.length && options.length > 0;

            return (
                <div ref={wrapperRef} className={`relative flex-1 min-w-[140px] multiselect-container ${isOpen ? 'active' : ''}`}>
                    <div 
                        className={`bg-slate-100 border border-transparent rounded-xl px-3 py-2.5 text-sm outline-none text-slate-700 font-bold w-full cursor-pointer flex justify-between items-center transition-colors ${isOpen ? 'bg-white border-blue-500 ring-2 ring-blue-500/20' : 'hover:bg-slate-200'}`}
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <span className="truncate pr-2">{displayText}</span>
                        <IconChevronDown className={`text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
                    </div>
                    
                    <div className="multiselect-dropdown custom-scrollbar py-1">
                        <div className="px-3 py-2 border-b border-slate-100 flex items-center gap-2 cursor-pointer hover:bg-slate-50" onClick={toggleAll}>
                            <input 
                                type="checkbox" 
                                checked={isAllSelected}
                                onChange={toggleAll}
                                className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer"
                                onClick={(e) => e.stopPropagation()}
                            />
                            <span className="text-sm font-bold text-slate-800 select-none">Sélectionner tout</span>
                        </div>
                        {options.map(option => (
                            <label key={option} className="px-3 py-2 flex items-start gap-2 cursor-pointer hover:bg-slate-50 transition-colors">
                                <input 
                                    type="checkbox" 
                                    checked={selectedOptions.includes(option)}
                                    onChange={() => toggleOption(option)}
                                    className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 mt-0.5 cursor-pointer"
                                />
                                <span className="text-sm text-slate-700 select-none break-words flex-1 leading-tight">{option}</span>
                            </label>
                        ))}
                        {options.length === 0 && (
                            <div className="px-3 py-4 text-sm text-slate-400 italic text-center">Aucune option</div>
                        )}
                    </div>
                </div>
            );
        };

        // --- VUE PARAMÈTRES BDD ---
        const SettingsView = ({ bikes, onUpload }) => {
            const [status, setStatus] = useState(null);
            const [sheetUrl, setSheetUrl] = useState(() => localStorage.getItem('roadmap_sheet_url') || '');
            
            const total26 = bikes.reduce((s, b) => s + (parseInt(b.q26) || 0), 0);
            
            const handleUrlChange = (e) => {
                setSheetUrl(e.target.value);
                localStorage.setItem('roadmap_sheet_url', e.target.value);
            };

            const exportUrl = useMemo(() => {
                if (!sheetUrl.trim()) return null;
                const matchGid = sheetUrl.match(/gid=([0-9]+)/);
                const gidParam = matchGid ? `&gid=${matchGid[1]}` : '';
                const baseUrl = sheetUrl.split('/edit')[0];
                return `${baseUrl}/export?format=csv${gidParam}`;
            }, [sheetUrl]);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = parseCSV(event.target.result);
                        if (data && data.length > 0) {
                            onUpload(data);
                            setStatus({ type: 'success', msg: `${data.length} vélos mis à jour et sauvegardés !` });
                        } else {
                            setStatus({ type: 'error', msg: "Format non reconnu. Aucune donnée n'a pu être extraite." });
                        }
                    } catch (err) { 
                        setStatus({ type: 'error', msg: err.message }); 
                    }
                };
                reader.readAsText(file, 'UTF-8'); 
            };

            const loadSharedBase = async () => {
                try {
                    const res = await fetch('./bdd.csv');
                    if (!res.ok) throw new Error("Aucun fichier bdd.csv trouvé sur le serveur.");
                    const text = await res.text();
                    const data = parseCSV(text);
                    if (data && data.length > 0) {
                        onUpload(data);
                        setStatus({ type: 'success', msg: `${data.length} vélos chargés depuis la base commune (bdd.csv).` });
                    } else {
                        setStatus({ type: 'error', msg: "Le fichier bdd.csv est vide ou illisible." });
                    }
                } catch (err) {
                    setStatus({ type: 'error', msg: err.message });
                }
            };

            return (
                <div className="space-y-6 animate-fadeIn">
                    {status && (
                        <div className={`p-4 rounded-xl flex justify-between items-center shadow-sm ${status.type === 'success' ? 'bg-emerald-100 text-emerald-800 border border-emerald-200' : 'bg-rose-100 text-rose-800 border border-rose-200'}`}>
                            <span className="font-bold text-sm flex items-center gap-2">{status.type === 'success' ? '✅' : '⚠️'} {status.msg}</span>
                            <button onClick={() => setStatus(null)}>✕</button>
                        </div>
                    )}
                    
                    <h1 className="text-2xl font-bold mb-6">Paramètres Base de données</h1>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800">
                                <IconDatabase size={20} className="text-blue-500" /> Source de données
                            </h2>
                            <button onClick={loadSharedBase} className="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors flex items-center gap-2 shadow-sm border border-slate-200">
                                <IconDatabase size={14} /> Forcer le rechargement de bdd.csv
                            </button>
                        </div>
                        
                        <div className="bg-slate-50 p-6 rounded-xl border border-slate-100 mb-2">
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">1. Lien Google Sheets (Onglet cible)</label>
                            <input 
                                type="text" 
                                placeholder="Collez l'URL complète avec le gid (ex: https://docs.google.com/spreadsheets/d/.../edit?gid=224286025)" 
                                className="w-full bg-white border border-slate-200 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none mb-6 shadow-sm" 
                                value={sheetUrl} 
                                onChange={handleUrlChange} 
                            />

                            <div className="flex flex-col md:flex-row gap-4 items-center">
                                <div className="flex-1 w-full bg-white p-5 rounded-lg border border-slate-200 flex flex-col items-center text-center shadow-sm">
                                    <div className="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold mb-3">1</div>
                                    <p className="text-sm font-bold text-slate-800 mb-1">Générer le CSV</p>
                                    <p className="text-xs text-slate-500 mb-4 h-8">Télécharge l'onglet sélectionné grâce à votre session.</p>
                                    
                                    {exportUrl ? (
                                        <a href={exportUrl} target="_blank" rel="noopener noreferrer" className="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-blue-700 transition-all flex items-center gap-2 shadow-sm w-full justify-center">
                                            <IconDownload size={18} /> Télécharger
                                        </a>
                                    ) : (
                                        <button disabled className="bg-slate-200 text-slate-400 px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 cursor-not-allowed w-full justify-center">
                                            <IconDownload size={18} /> URL requise
                                        </button>
                                    )}
                                </div>

                                <IconArrowRight className="hidden md:block text-slate-300" />

                                <div className="flex-1 w-full bg-white p-5 rounded-lg border border-slate-200 flex flex-col items-center text-center shadow-sm">

                                    <p className="text-sm font-bold text-slate-800 mb-1">Injecter & Sauvegarder</p>
                                    <p className="text-xs text-slate-500 mb-4 h-8">Importez le fichier pour l'enregistrer dans votre cache.</p>
                                    
                                    <label className="bg-emerald-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold hover:bg-emerald-700 transition-all flex items-center gap-2 shadow-sm cursor-pointer w-full justify-center">
                                        <IconUpload size={18} /> Mettre à jour la base
                                        <input type="file" accept=".csv" onChange={handleFile} className="hidden" />
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <p className="text-slate-500 text-xs font-bold uppercase">Modèles actifs</p>
                            <h3 className="text-4xl font-black text-slate-800 mt-2">{bikes.length}</h3>
                        </div>

                            <p className="text-slate-500 text-xs font-bold uppercase">Volume Total 2026</p>
                            <h3 className="text-4xl font-black text-blue-600 mt-2">{total26.toLocaleString()}</h3>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                            <p className="text-slate-500 text-xs font-bold uppercase">E-Kits distincts</p>
                            <h3 className="text-4xl font-black text-amber-500 mt-2">{new Set(bikes.map(b => b.ekit)).size}</h3>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPOSANT ID CARD MODAL ---
        const BikeIdCardModal = ({ selectedBike, onClose }) => {
            if (!selectedBike) return null;

            const formatDisplayDate = (isoStr) => {
                if (!isoStr) return 'N/A';
                const d = new Date(isoStr);
                return isNaN(d.getTime()) ? 'N/A' : d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
            };

            const modalContent = (
                <div

                    style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: 'rgba(15, 23, 42, 0.6)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}
                >
                    <div 
                        className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200 animate-fadeIn max-h-[90vh] flex flex-col"

                    >
                        <div className="bg-slate-900 px-8 py-6 text-white flex justify-between items-start shrink-0">

                        <div className="p-8 overflow-y-auto">

                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">

                                    <div className="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-2 shadow-inner"><IconCpu size={20} /></div>
                                    <p className="text-[10px] uppercase font-bold text-slate-400">E-Kit</p>

                                    <p className="text-[10px] uppercase font-bold text-slate-400">Moteur</p>

                                    <p className="text-[10px] uppercase font-bold text-slate-400">Batterie</p>

                                <div className="bg-slate-50 border border-slate-100 rounded-2xl p-4 flex flex-col items-center text-center">

                                    <p className="text-[10px] uppercase font-bold text-slate-400">Display / HMI</p>

                                    <p className="text-[10px] uppercase font-bold text-slate-400">Driver</p>
                                    <p className="font-bold text-slate-800 mt-1 text-xs">{selectedBike.driver}</p>
                                </div>
                            </div>

                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 border-b border-slate-100 pb-2">Cycle de vie & Quantités (Volumes)</h3>
                            <div className="bg-blue-50/50 rounded-2xl p-6 border border-blue-100 flex items-center justify-between">
                                <div className="text-center">
                                    <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">SOP</p>
                                    <p className="font-black text-xl text-slate-800">{formatDisplayDate(selectedBike.parsedStart)}</p>
                                </div>
                                <div className="h-px bg-blue-200 flex-1 mx-6 relative">
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white border border-blue-200 px-3 py-1 rounded-full text-xs font-bold text-blue-600 shadow-sm">
                                        {YEARS.reduce((s, y) => s + (selectedBike[`q${y.toString().slice(-2)}`] || 0), 0).toLocaleString()} unités totales
                                    </div>
                                </div>
                                <div className="text-center">
                                    <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">EOP</p>
                                    <p className="font-black text-xl text-slate-800">{formatDisplayDate(selectedBike.parsedEnd)}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return ReactDOM.createPortal(modalContent, document.body);
        };

        // --- VUE BASE VÉLOS ---
        const ListAndIdCardView = ({ bikes, onSelectBike }) => {
            const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'ascending' });

            const requestSort = (key) => {
                let direction = 'ascending';
                if (sortConfig.key === key && sortConfig.direction === 'ascending') {
                    direction = 'descending';
                }
                setSortConfig({ key, direction });
            };

            const sortedBikes = useMemo(() => {
                let sortable = [...bikes];
                sortable.sort((a, b) => {
                    let aVal, bVal;
                    if (sortConfig.key === 'totalVol') {
                        aVal = YEARS.reduce((s, y) => s + (a[`q${y.toString().slice(-2)}`] || 0), 0);
                        bVal = YEARS.reduce((s, y) => s + (b[`q${y.toString().slice(-2)}`] || 0), 0);
                    } else if (sortConfig.key === 'startYear') {
                        aVal = a.parsedStart ? new Date(a.parsedStart).getTime() : 0;
                        bVal = b.parsedStart ? new Date(b.parsedStart).getTime() : 0;
                    } else {
                        aVal = (a[sortConfig.key] || '').toString().toLowerCase();
                        bVal = (b[sortConfig.key] || '').toString().toLowerCase();
                    }
                    
                    if (aVal < bVal) return sortConfig.direction === 'ascending' ? -1 : 1;
                    if (aVal > bVal) return sortConfig.direction === 'ascending' ? 1 : -1;
                    return 0;
                });
                return sortable;
            }, [bikes, sortConfig]);

            return (
                <div className="space-y-6 animate-fadeIn">
                    <div className="p-6 bg-white rounded-2xl shadow-sm border border-slate-200 border-b border-slate-100 flex justify-between items-center">
                        <div>
                            <h2 className="text-lg font-bold text-slate-800">Base Vélos Complète</h2>
                            <p className="text-xs text-slate-500 mt-1">Cliquez sur un en-tête pour trier, ou sur une ligne pour afficher l'ID Card.</p>
                        </div>
                        <div className="text-sm text-slate-500 font-medium">{sortedBikes.length} résultats</div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-wider">
                                <tr>
                                    <th className="py-4 px-6 cursor-pointer hover:bg-slate-200 transition-colors select-none" onClick={() => requestSort('name')}>
                                        Modèle & Segment {sortConfig.key === 'name' && <IconSort direction={sortConfig.direction} />}
                                    </th>
                                    <th className="py-4 px-6 cursor-pointer hover:bg-slate-200 transition-colors select-none" onClick={() => requestSort('ekit')}>
                                        E-Kit {sortConfig.key === 'ekit' && <IconSort direction={sortConfig.direction} />}
                                    </th>
                                    <th className="py-4 px-6 cursor-pointer hover:bg-slate-200 transition-colors select-none" onClick={() => requestSort('motor')}>
                                        Moteur {sortConfig.key === 'motor' && <IconSort direction={sortConfig.direction} />}
                                    </th>
                                    <th className="py-4 px-6 cursor-pointer hover:bg-slate-200 transition-colors select-none" onClick={() => requestSort('battery')}>
                                        Batterie {sortConfig.key === 'battery' && <IconSort direction={sortConfig.direction} />}
                                    </th>
                                    <th className="py-4 px-6 cursor-pointer hover:bg-slate-200 transition-colors text-center select-none" onClick={() => requestSort('startYear')}>
                                        SOP {sortConfig.key === 'startYear' && <IconSort direction={sortConfig.direction} />}
                                    </th>
                                    <th className="py-4 px-6 cursor-pointer hover:bg-slate-200 transition-colors text-right select-none" onClick={() => requestSort('totalVol')}>
                                        Vol. Total {sortConfig.key === 'totalVol' && <IconSort direction={sortConfig.direction} />}
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                {sortedBikes.map(b => {
                                    const d = new Date(b.parsedStart);
                                    const dateStr = !isNaN(d.getTime()) ? d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }) : b.startRaw;
                                    
                                    return (
                                        <tr key={b.id} onClick={() => onSelectBike(b)} className="border-b border-slate-50 hover:bg-blue-50/50 transition-colors cursor-pointer group">
                                            <td className="py-4 px-6">
                                                <p className="font-bold text-slate-800 group-hover:text-blue-600 transition-colors">{b.name}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-0.5">{b.sport} • {b.projectManager}</p>
                                            </td>
                                            <td className="py-4 px-6 text-sm font-medium text-slate-600">{b.ekit}</td>
                                            <td className="py-4 px-6 text-sm text-slate-500">{b.motor}</td>
                                            <td className="py-4 px-6 text-sm text-slate-500">{b.battery}</td>

                                                <span className="px-3 py-1 bg-emerald-50 text-emerald-700 text-[10px] font-bold rounded-full uppercase whitespace-nowrap">{dateStr}</span>
                                            </td>
                                            <td className="py-4 px-6 text-sm text-slate-600 font-bold text-right">
                                                {YEARS.reduce((s, y) => s + (b[`q${y.toString().slice(-2)}`] || 0), 0).toLocaleString()}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- VUE PROJECTIONS (GRAPHIQUE EMPILÉ ET DÉPILEMENT) ---
        const ProjectionsView = ({ bikes }) => {
            const [type, setType] = useState('ekit'); 
            const [sortConfig, setSortConfig] = useState({ key: 'total', direction: 'descending' });
            
            // Palette de couleurs pour les segments empilés
            const COLORS = [
                'bg-blue-500', 'bg-emerald-500', 'bg-amber-500', 'bg-purple-500', 
                'bg-rose-500', 'bg-cyan-500', 'bg-indigo-500', 'bg-teal-500', 
                'bg-fuchsia-500', 'bg-pink-500', 'bg-lime-500', 'bg-orange-500',
                'bg-sky-500', 'bg-violet-500', 'bg-red-500'
            ];
            
            const [expandedRefs, setExpandedRefs] = useState({});

            const requestSort = (key) => {
                let direction = 'descending';
                if (sortConfig.key === key && sortConfig.direction === 'descending') {
                    direction = 'ascending';
                } else if (sortConfig.key === key && sortConfig.direction === 'ascending') {
                    direction = 'descending';
                } else {
                    direction = key === 'ref' ? 'ascending' : 'descending';
                }
                setSortConfig({ key, direction });
            };

            const toggleRow = (ref) => {
                setExpandedRefs(prev => ({ ...prev, [ref]: !prev[ref] }));
            };

            const aggregated = useMemo(() => {
                const agg = {};
                bikes.forEach(b => {
                    const ref = b[type] || 'Inconnu';
                    if (!agg[ref]) agg[ref] = { ref, bikesList: [], q26: 0, q27: 0, q28: 0, q29: 0, q30: 0, q31: 0 };
                    
                    agg[ref].bikesList.push(b);

                    YEARS.forEach(y => {
                        const key = `q${y.toString().slice(-2)}`;
                        agg[ref][key] += b[key] || 0;
                    });
                });

                const sortedAgg = Object.values(agg).sort((a,b) => {
                    let aVal, bVal;
                    if (sortConfig.key === 'ref') {
                        aVal = a.ref.toLowerCase();
                        bVal = b.ref.toLowerCase();
                    } else if (sortConfig.key === 'total') {
                        aVal = YEARS.reduce((s, y) => s + a[`q${y.toString().slice(-2)}`], 0);
                        bVal = YEARS.reduce((s, y) => s + b[`q${y.toString().slice(-2)}`], 0);
                    } else {
                        const key = `q${sortConfig.key.toString().slice(-2)}`;
                        aVal = a[key];
                        bVal = b[key];
                    }

                    if (aVal < bVal) return sortConfig.direction === 'ascending' ? -1 : 1;
                    if (aVal > bVal) return sortConfig.direction === 'ascending' ? 1 : -1;
                    return 0;
                });

                sortedAgg.forEach(row => {
                    row.bikesList.sort((a, b) => {
                        const sumA = YEARS.reduce((s, y) => s + (a[`q${y.toString().slice(-2)}`] || 0), 0);
                        const sumB = YEARS.reduce((s, y) => s + (b[`q${y.toString().slice(-2)}`] || 0), 0);
                        return sumB - sumA;
                    });
                });

                return sortedAgg;
            }, [bikes, type, sortConfig]);

            const maxYearlyTotal = useMemo(() => {
                const totals = YEARS.map(y => aggregated.reduce((s, d) => s + (d[`q${y.toString().slice(-2)}`] || 0), 0));
                return Math.max(...totals, 1); 
            }, [aggregated]);

            return (
                <div className="space-y-6 animate-fadeIn">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold">Dashboard <span className="text-slate-400 text-lg font-medium ml-2">| Projections Quantités</span></h1>
                        <div className="bg-white p-1 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-1">
                            {['ekit', 'motor', 'battery', 'display', 'driver'].map(t => (
                                <button key={t} onClick={() => setType(t)} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${type === t ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    {t === 'ekit' ? 'E-Kits' : t === 'motor' ? 'Moteurs' : t === 'battery' ? 'Batteries' : t === 'display' ? 'Displays (HMI)' : 'Drivers'}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        {/* Graphique Empilé (Stacked Bar Chart) */}
                        <div className="flex items-end gap-4 mb-10 border-b border-slate-100 pb-2 mt-8" style={{ height: '300px' }}>
                            {YEARS.map(y => {
                                const key = `q${y.toString().slice(-2)}`;
                                const totalYear = aggregated.reduce((s, d) => s + (d[key] || 0), 0);
                                const heightPercent = maxYearlyTotal > 0 ? (totalYear / maxYearlyTotal) * 100 : 0;
                                
                                return (
                                    <div key={y} className="flex-1 h-full flex flex-col justify-end items-center gap-2 group relative">
                                        <div 
                                            className="w-full bg-slate-50 flex flex-col-reverse justify-start rounded-t-xl relative overflow-hidden transition-all duration-700" 
                                            style={{ height: `${Math.max(heightPercent, totalYear > 0 ? 1 : 0)}%` }}
                                        >
                                            {totalYear > 0 && aggregated.map((row, i) => {
                                                const val = row[key] || 0;
                                                if (val === 0) return null;
                                                const segmentPercent = (val / totalYear) * 100;
                                                const colorClass = COLORS[i % COLORS.length];
                                                
                                                return (
                                                    <div 
                                                        key={row.ref}
                                                        className={`w-full transition-all duration-300 hover:brightness-110 border-t border-white/20 ${colorClass}`}
                                                        style={{ height: `${segmentPercent}%` }}
                                                        title={`${row.ref} : ${val.toLocaleString()} unités`}
                                                    ></div>
                                                );
                                            })}
                                        </div>
                                        <div className="absolute -top-8 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-700 opacity-0 group-hover:opacity-100 transition-opacity bg-white px-2 py-1 rounded shadow-md whitespace-nowrap z-10 pointer-events-none border border-slate-200">
                                            Total: {totalYear.toLocaleString()}
                                        </div>
                                        <span className="text-xs font-bold text-slate-400 mt-2">{y}</span>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Tableau de détail triable avec Dépilement et Code Couleur */}
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead>
                                    <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                        <th className="py-4 px-2 cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('ref')}>
                                            Référence Component {sortConfig.key === 'ref' && <IconSort direction={sortConfig.direction} />}
                                        </th>
                                        {YEARS.map(y => (
                                            <th key={y} className="py-4 px-2 text-right cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort(y)}>
                                                {y} {sortConfig.key === y && <IconSort direction={sortConfig.direction} />}
                                            </th>
                                        ))}
                                        <th className="py-4 px-2 text-right text-blue-600 cursor-pointer hover:bg-slate-200 select-none" onClick={() => requestSort('total')}>
                                            Total {sortConfig.key === 'total' && <IconSort direction={sortConfig.direction} />}
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {aggregated.map((row, i) => {
                                        const rowTotal = YEARS.reduce((s, y) => s + row[`q${y.toString().slice(-2)}`], 0);
                                        if (rowTotal === 0) return null;
                                        
                                        const isExpanded = expandedRefs[row.ref];
                                        const colorClass = COLORS[i % COLORS.length];

                                        return (
                                            <React.Fragment key={i}>
                                                <tr 
                                                    className={`border-b border-slate-50 hover:bg-slate-50/80 transition-colors cursor-pointer group ${isExpanded ? 'bg-slate-50/50' : ''}`}
                                                    onClick={() => toggleRow(row.ref)}
                                                >
                                                    <td className="py-4 px-2 font-bold text-slate-700 flex items-center gap-2">
                                                        <IconChevronDown className={`text-slate-400 transition-transform duration-200 ${isExpanded ? '' : '-rotate-90'}`} size={16} />
                                                        <div className={`w-3 h-3 rounded-full shrink-0 shadow-inner ${colorClass}`}></div>
                                                        {row.ref}
                                                    </td>
                                                    {YEARS.map(y => <td key={y} className="py-4 px-2 text-right text-sm text-slate-600 font-medium">{row[`q${y.toString().slice(-2)}`].toLocaleString()}</td>)}
                                                    <td className="py-4 px-2 text-right text-sm text-blue-600 font-black">{rowTotal.toLocaleString()}</td>
                                                </tr>
                                                
                                                {isExpanded && row.bikesList.map((bike, j) => {
                                                    const bikeTotal = YEARS.reduce((s, y) => s + (bike[`q${y.toString().slice(-2)}`] || 0), 0);
                                                    if (bikeTotal === 0) return null;
                                                    return (
                                                        <tr key={`${i}-${j}`} className="bg-slate-50/50 border-b border-slate-100/50">
                                                            <td className="py-3 px-2 pl-10 text-slate-500 font-medium text-xs flex items-center gap-2">
                                                                <div className="w-1.5 h-1.5 bg-slate-300 rounded-full"></div>
                                                                <span className="truncate max-w-[250px]" title={bike.name}>{bike.name}</span>
                                                            </td>
                                                            {YEARS.map(y => (
                                                                <td key={y} className="py-3 px-2 text-right text-xs text-slate-400">
                                                                    {bike[`q${y.toString().slice(-2)}`] > 0 ? bike[`q${y.toString().slice(-2)}`].toLocaleString() : '-'}
                                                                </td>
                                                            ))}
                                                            <td className="py-3 px-2 text-right text-xs text-slate-500 font-bold">{bikeTotal.toLocaleString()}</td>
                                                        </tr>
                                                    );
                                                })}
                                            </React.Fragment>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('projections'); 
            
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedSports, setSelectedSports] = useState([]); 
            const [selectedEkits, setSelectedEkits] = useState([]);
            const [selectedMotors, setSelectedMotors] = useState([]);
            const [selectedBatteries, setSelectedBatteries] = useState([]);
            const [selectedDrivers, setSelectedDrivers] = useState([]);
            const [selectedDisplays, setSelectedDisplays] = useState([]);

            const [selectedBike, setSelectedBike] = useState(null);
            
            const [bikesData, setBikesData] = useState(() => {
                const cached = localStorage.getItem('roadmap_bikes_data');
                return cached ? JSON.parse(cached) : [];
            });

            useEffect(() => {
                const loadAuto = async () => {
                    if (bikesData.length === 0) {
                        try {
                            const res = await fetch('./bdd.csv');
                            if (res.ok) {
                                const text = await res.text();
                                const data = parseCSV(text);
                                if (data && data.length > 0) {
                                    setBikesData(data);
                                    localStorage.setItem('roadmap_bikes_data', JSON.stringify(data));
                                }
                            }
                        } catch (err) {
                            console.log('Fichier bdd.csv non trouvé ou illisible au démarrage.');
                        }
                    }
                };
                loadAuto();
            }, [bikesData.length]);

            const handleUpdateData = (data) => {
                setBikesData(data);
                localStorage.setItem('roadmap_bikes_data', JSON.stringify(data));
            };

            const activeFilteredBikesForOptions = useMemo(() => {
                const term = searchTerm.trim().toLowerCase();
                return bikesData.filter(b => {
                    const matchSearch = !term || [b.name, b.ekit, b.motor, b.sport, b.platform, b.display, b.battery, b.driver].some(field => (field || "").toString().toLowerCase().includes(term));
                    const matchSport = selectedSports.length === 0 || selectedSports.includes(b.sport);
                    const matchEkit = selectedEkits.length === 0 || selectedEkits.includes(b.ekit);
                    const matchMotor = selectedMotors.length === 0 || selectedMotors.includes(b.motor);
                    const matchBattery = selectedBatteries.length === 0 || selectedBatteries.includes(b.battery);
                    const matchDriver = selectedDrivers.length === 0 || selectedDrivers.includes(b.driver);
                    const matchDisplay = selectedDisplays.length === 0 || selectedDisplays.includes(b.display);
                    
                    return matchSearch && matchSport && matchEkit && matchMotor && matchBattery && matchDriver && matchDisplay;
                });
            }, [bikesData, searchTerm, selectedSports, selectedEkits, selectedMotors, selectedBatteries, selectedDrivers, selectedDisplays]);

            const allSports = useMemo(() => Array.from(new Set(bikesData.map(b => b.sport).filter(s => s && s !== 'N/A'))).sort(), [bikesData]);
            const allEkits = useMemo(() => Array.from(new Set(bikesData.map(b => b.ekit).filter(s => s && s !== 'N/A'))).sort(), [bikesData]);
            const allMotors = useMemo(() => Array.from(new Set(bikesData.map(b => b.motor).filter(s => s && s !== 'N/A'))).sort(), [bikesData]);
            const allBatteries = useMemo(() => Array.from(new Set(bikesData.map(b => b.battery).filter(s => s && s !== 'N/A'))).sort(), [bikesData]);
            const allDrivers = useMemo(() => Array.from(new Set(bikesData.map(b => b.driver).filter(s => s && s !== 'N/A'))).sort(), [bikesData]);
            const allDisplays = useMemo(() => Array.from(new Set(bikesData.map(b => b.display).filter(s => s && s !== 'N/A'))).sort(), [bikesData]);

            const availableSports = useMemo(() => Array.from(new Set(activeFilteredBikesForOptions.map(b => b.sport).filter(s => s && s !== 'N/A'))).sort(), [activeFilteredBikesForOptions]);
            const availableEkits = useMemo(() => Array.from(new Set(activeFilteredBikesForOptions.map(b => b.ekit).filter(s => s && s !== 'N/A'))).sort(), [activeFilteredBikesForOptions]);
            const availableMotors = useMemo(() => Array.from(new Set(activeFilteredBikesForOptions.map(b => b.motor).filter(s => s && s !== 'N/A'))).sort(), [activeFilteredBikesForOptions]);
            const availableBatteries = useMemo(() => Array.from(new Set(activeFilteredBikesForOptions.map(b => b.battery).filter(s => s && s !== 'N/A'))).sort(), [activeFilteredBikesForOptions]);
            const availableDrivers = useMemo(() => Array.from(new Set(activeFilteredBikesForOptions.map(b => b.driver).filter(s => s && s !== 'N/A'))).sort(), [activeFilteredBikesForOptions]);
            const availableDisplays = useMemo(() => Array.from(new Set(activeFilteredBikesForOptions.map(b => b.display).filter(s => s && s !== 'N/A'))).sort(), [activeFilteredBikesForOptions]);


            return (
                <div className="flex min-h-screen bg-slate-50">
                    <aside className="w-64 bg-slate-900 text-slate-400 flex flex-col fixed h-full z-20">
                        <div className="p-8 flex items-center gap-3 text-white">
                            <div className="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/40"><IconBike size={24} /></div>
                            <span className="font-black text-xl tracking-tighter italic uppercase">Dashboard Eboost</span>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-1">
                            {['projections', 'roadmap', 'list'].map(id => {
                                const labels = { projections: 'Dashboard', roadmap: 'Roadmap', list: 'Base Vélos' };
                                return (
                                    <button key={id} onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${activeTab === id ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                        <span>{labels[id]}</span>
                                    </button>
                                );
                            })}
                        </nav>
                        <div className="p-4 border-t border-slate-800 text-center">
                            <span className="text-[10px] uppercase font-bold text-slate-600 tracking-widest">Intégration BDD</span>
                        </div>
                    </aside>

                    <div className="flex-1 ml-64 flex flex-col min-w-0">
                        <header className="bg-white border-b border-slate-200 px-8 py-4 sticky top-0 z-10 shadow-sm flex items-center justify-between min-h-[80px]">
                            {/* Filtres Globaux Multi-Select */}
                            <div className="flex flex-wrap gap-3 w-full max-w-6xl items-center">
                                <div className="relative flex-[1.5] min-w-[180px]">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><IconSearch size={18} /></div>
                                    <input type="text" placeholder="Recherche globale..." className="w-full bg-slate-100 border-transparent rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all font-medium text-slate-800" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                
                                <MultiSelect 
                                    options={selectedSports.length > 0 ? allSports : availableSports} 
                                    selectedOptions={selectedSports} 
                                    onChange={setSelectedSports} 
                                    placeholder="Sports" 
                                />
                                <MultiSelect 
                                    options={selectedEkits.length > 0 ? allEkits : availableEkits} 
                                    selectedOptions={selectedEkits} 
                                    onChange={setSelectedEkits} 
                                    placeholder="E-Kits" 
                                />
                                <MultiSelect 
                                    options={selectedMotors.length > 0 ? allMotors : availableMotors} 
                                    selectedOptions={selectedMotors} 
                                    onChange={setSelectedMotors} 
                                    placeholder="Moteurs" 
                                />
                                <MultiSelect 
                                    options={selectedBatteries.length > 0 ? allBatteries : availableBatteries} 
                                    selectedOptions={selectedBatteries} 
                                    onChange={setSelectedBatteries} 
                                    placeholder="Batteries" 
                                />
                                <MultiSelect 
                                    options={selectedDisplays.length > 0 ? allDisplays : availableDisplays} 
                                    selectedOptions={selectedDisplays} 
                                    onChange={setSelectedDisplays} 
                                    placeholder="HMI" 
                                />
                                <MultiSelect 
                                    options={selectedDrivers.length > 0 ? allDrivers : availableDrivers} 
                                    selectedOptions={selectedDrivers} 
                                    onChange={setSelectedDrivers} 
                                    placeholder="Drivers" 
                                />
                                
                                {/* Bouton Reset des filtres */}
                                {(searchTerm || selectedSports.length > 0 || selectedEkits.length > 0 || selectedMotors.length > 0 || selectedBatteries.length > 0 || selectedDrivers.length > 0 || selectedDisplays.length > 0) && (
                                    <button 
                                        onClick={() => {
                                            setSearchTerm('');
                                            setSelectedSports([]);
                                            setSelectedEkits([]);
                                            setSelectedMotors([]);
                                            setSelectedBatteries([]);
                                            setSelectedDrivers([]);
                                            setSelectedDisplays([]);
                                        }} 
                                        className="text-xs font-bold text-slate-400 hover:text-rose-500 underline transition-colors px-2"
                                    >
                                        Reset
                                    </button>
                                )}
                            </div>

                            <div className="flex items-center ml-4 pl-4 border-l border-slate-200">
                                <button 
                                    onClick={() => setActiveTab('settings')}
                                    className={`p-2 rounded-full transition-colors ${activeTab === 'settings' ? 'bg-blue-100 text-blue-600' : 'text-slate-400 hover:bg-slate-100 hover:text-blue-600'}`}
                                    title="Paramètres Base de données"
                                >
                                    <IconSettings size={24} />
                                </button>
                            </div>
                        </header>

                        <main className="p-10 max-w-7xl w-full mx-auto">
                            {bikesData.length === 0 && activeTab !== 'settings' ? (
                                <div className="text-center py-20 animate-fadeIn">
                                    <IconDatabase size={48} className="mx-auto text-slate-300 mb-4" />
                                    <h2 className="text-xl font-bold text-slate-500">Aucune donnée en cache.</h2>
                                    <button onClick={() => setActiveTab('settings')} className="mt-6 text-blue-600 font-bold hover:underline">Aller aux Paramètres pour charger les données</button>
                                </div>
                            ) : (
                                <>
                                    {activeTab === 'settings' && <SettingsView bikes={activeFilteredBikesForOptions} onUpload={handleUpdateData} />}
                                    
                                    {activeTab === 'list' && <ListAndIdCardView bikes={activeFilteredBikesForOptions} onSelectBike={setSelectedBike} />}

                                    {activeTab === 'projections' && <ProjectionsView bikes={activeFilteredBikesForOptions} />}

                                    {activeTab === 'roadmap' && (
                                        <div className="space-y-6 animate-fadeIn">
                                            <h1 className="text-2xl font-bold">Roadmap</h1>
                                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                                                
                                                {/* Header de la grille (Années + Trimestres) */}
                                                <div className="flex gap-4 mb-4 border-b border-slate-50 pb-4 text-[10px] font-black text-slate-400 uppercase tracking-wider">
                                                    <div className="w-[30%] min-w-[150px] pr-4 flex items-end">Modèle de vélo</div>
                                                    <div className="w-[70%] flex relative">
                                                        {YEARS.map((y, i) => (
                                                            <div key={y} className={`flex-1 text-center flex flex-col ${i > 0 ? 'border-l border-slate-200/50' : ''}`}>
                                                                <span className="mb-1 text-slate-500 text-xs">{y}</span>
                                                                <div className="flex justify-around text-[8px] text-slate-300 px-1 opacity-70">
                                                                    <span className="w-1/4 text-center">Q1</span>
                                                                    <span className="w-1/4 text-center">Q2</span>
                                                                    <span className="w-1/4 text-center">Q3</span>
                                                                    <span className="w-1/4 text-center">Q4</span>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="space-y-3">
                                                    {activeFilteredBikesForOptions.map(b => {
                                                        const timelineStartMs = new Date(2026, 0, 1).getTime();
                                                        const timelineEndMs = new Date(2032, 0, 1).getTime();
                                                        const timelineDuration = timelineEndMs - timelineStartMs;

                                                        const sMs = b.parsedStart ? new Date(b.parsedStart).getTime() : new Date(b.startYear, 0, 1).getTime();
                                                        const eMs = b.parsedEnd ? new Date(b.parsedEnd).getTime() : new Date(b.endYear, 11, 31).getTime();

                                                        const clampedStart = Math.max(timelineStartMs, Math.min(sMs, timelineEndMs));
                                                        const clampedEnd = Math.max(timelineStartMs, Math.min(eMs, timelineEndMs));

                                                        const leftPos = ((clampedStart - timelineStartMs) / timelineDuration) * 100;
                                                        const widthPos = ((clampedEnd - clampedStart) / timelineDuration) * 100;

                                                        const formatDate = (isoStr) => {
                                                            const d = new Date(isoStr);
                                                            return !isNaN(d.getTime()) ? d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A';
                                                        };

                                                        return (
                                                            <div key={b.id} className="flex gap-4 items-center cursor-pointer hover:bg-slate-50 p-2 -mx-2 rounded-lg transition-colors group" onClick={() => setSelectedBike(b)}>
                                                                <div className="w-[30%] min-w-[150px] pr-4">
                                                                    <p className="font-bold text-slate-800 truncate leading-tight group-hover:text-blue-600 transition-colors" title={b.name}>{b.name}</p>
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase">{b.sport}</span>
                                                                </div>
                                                                
                                                                <div className="w-[70%] relative h-8 bg-slate-50/50 rounded overflow-visible flex">
                                                                    <div className="absolute inset-0 flex pointer-events-none">
                                                                        {YEARS.map((y, i) => (
                                                                            <div key={y} className={`flex-1 flex ${i > 0 ? 'border-l border-slate-200/50' : ''}`}>
                                                                                <div className="flex-1 border-r border-slate-200/30"></div>
                                                                                <div className="flex-1 border-r border-slate-200/30"></div>
                                                                                <div className="flex-1 border-r border-slate-200/30"></div>
                                                                                <div className="flex-1"></div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                    
                                                                    <div 
                                                                        className="absolute h-6 top-1 bg-blue-500/30 rounded border border-blue-500/50 transition-colors group/bar hover:bg-blue-500/50"
                                                                        style={{ left: `${leftPos}%`, width: `${widthPos}%` }}
                                                                    >
                                                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover/bar:flex flex-col items-center z-10 w-max">
                                                                            <div className="bg-slate-800 text-white text-xs px-3 py-2 rounded-lg shadow-xl font-medium text-center">
                                                                                <p className="mb-1 border-b border-slate-700 pb-1">{b.name}</p>
                                                                                <span className="text-blue-300">SOP:</span> {formatDate(b.parsedStart)} <br/>
                                                                                <span className="text-emerald-300">EOP:</span> {formatDate(b.parsedEnd)}
                                                                            </div>
                                                                            <div className="w-2 h-2 bg-slate-800 rotate-45 -mt-1"></div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </main>
                    </div>

                    <BikeIdCardModal selectedBike={selectedBike} onClose={() => setSelectedBike(null)} />

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
