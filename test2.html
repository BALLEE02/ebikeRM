<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mobility Roadmap Center</title>
    <!-- Chargement de Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement de React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Chargement de Babel pour compiler le JSX dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- ICÔNES (Remplacement de lucide-react pour la version autonome) ---
        const IconBike = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>
        );
        const IconLayoutDashboard = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        );
        const IconMap = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
        );
        const IconBarChart3 = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>
        );
        const IconUpload = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        );
        const IconSettings = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const IconSearch = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        );
        const IconBell = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        );
        const IconCpu = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
        );
        const IconBattery = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>
        );
        const IconMonitorSmartphone = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h8"/><path d="M10 19v-3.96 3.15"/><path d="M7 19h5"/><rect width="6" height="10" x="16" y="12" rx="2"/></svg>
        );

        // --- DONNÉES DE DÉMONSTRATION ---
        const MOCK_BIKES_DATA = [
            { id: "1", name: "E-FL 900 V2 (LIGHT 16\")", sport: "CITY", platform: "HUB", motor: "Mahle X35", battery: "Inframe 500", display: "OIB eboost Mahle", startYear: 2029, endYear: 2031, q26: 0, q27: 0, q28: 0, q29: 1500, q30: 2500, q31: 3000 },
            { id: "2", name: "E-FL 900 (LIGHT 16\")", sport: "CITY", platform: "HUB", motor: "Mahle X35", battery: "Inframe 500", display: "OIB eboost Mahle", startYear: 2026, endYear: 2029, q26: 2344, q27: 4560, q28: 1365, q29: 1750, q30: 0, q31: 0 },
            { id: "3", name: "E-EDR AF APEX AXS", sport: "ROAD", platform: "HUB", motor: "Mahle X20", battery: "inframe360", display: "ERGO920", startYear: 2026, endYear: 2027, q26: 351, q27: 700, q28: 0, q29: 0, q30: 0, q31: 0 },
            { id: "4", name: "Trekking E-ACTV 100 V2", sport: "TREK", platform: "HUB IF", motor: "VRMG92", battery: "inframe360", display: "ERGO 100", startYear: 2026, endYear: 2030, q26: 52333, q27: 0, q28: 45000, q29: 55000, q30: 57000, q31: 0 },
            { id: "5", name: "TREKKING E-EXPL 940", sport: "MTB", platform: "Owuru", motor: "Owuru Ride 3 M", battery: "Battery Carrier 370Wh", display: "ERGO 920", startYear: 2026, endYear: 2030, q26: 1173, q27: 0, q28: 1020, q29: 1200, q30: 1300, q31: 0 },
            { id: "6", name: "E FOLD 900 1\"", sport: "FOLD", platform: "HUB seat post", motor: "VRMG92", battery: "Battery seatpost", display: "ERGO500", startYear: 2026, endYear: 2029, q26: 8000, q27: 9000, q28: 10000, q29: 12000, q30: 0, q31: 0 },
            { id: "7", name: "E-GRVL AF Discovery", sport: "GRVL", platform: "Hub essential", motor: "M99CD Ananda", battery: "inframe360", display: "ERGO920", startYear: 2026, endYear: 2028, q26: 500, q27: 1600, q28: 2000, q29: 0, q30: 0, q31: 0 },
            { id: "8", name: "E ST500 KIDS", sport: "KIDS", platform: "Hub motor V3", motor: "Hub motor V3", battery: "inframe360", display: "EB100", startYear: 2027, endYear: 2031, q26: 0, q27: 2000, q28: 2500, q29: 3000, q30: 3500, q31: 4000 },
        ];

        const YEARS = [2026, 2027, 2028, 2029, 2030, 2031];

        // --- COMPOSANTS DE L'INTERFACE ---

        const Sidebar = ({ activeTab, setActiveTab }) => {
            const menuItems = [
                { id: 'dashboard', label: 'Vue d\'ensemble', icon: IconLayoutDashboard },
                { id: 'roadmap', label: 'Roadmap Vélos', icon: IconMap },
                { id: 'projections', label: 'Projections Composants', icon: IconBarChart3 },
                { id: 'bikes', label: 'Base Vélos & BOM', icon: IconBike },
            ];

            return (
                <div className="w-64 h-screen bg-slate-900 text-slate-300 flex flex-col fixed left-0 top-0">
                    <div className="p-6 flex items-center gap-3 text-white">
                        <div className="bg-blue-600 p-2 rounded-lg">
                            <IconBike size={24} />
                        </div>
                        <span className="text-xl font-bold tracking-wide">E-Mobility<br/><span className="text-sm font-medium text-blue-400">Roadmap Center</span></span>
                    </div>
                    
                    <nav className="flex-1 px-4 py-6 space-y-2">
                        {menuItems.map((item) => {
                            const Icon = item.icon;
                            const isActive = activeTab === item.id;
                            return (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                                        isActive 
                                            ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' 
                                            : 'hover:bg-slate-800 hover:text-white'
                                    }`}
                                >
                                    <Icon size={20} />
                                    <span className="font-medium">{item.label}</span>
                                </button>
                            );
                        })}
                    </nav>

                    <div className="p-4 border-t border-slate-800">
                        <button className="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-colors">
                            <IconSettings size={20} />
                            <span className="font-medium">Paramètres</span>
                        </button>
                    </div>
                </div>
            );
        };

        const Topbar = () => (
            <header className="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
                <div className="flex items-center gap-4 w-96">
                    <div className="relative w-full">
                        <IconSearch className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
                        <input 
                            type="text" 
                            placeholder="Rechercher un composant, un vélo..." 
                            className="w-full pl-10 pr-4 py-2.5 bg-slate-100 border-transparent rounded-xl focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none"
                        />
                    </div>
                </div>
                <div className="flex items-center gap-4">
                    <button className="p-2.5 text-slate-500 hover:bg-slate-100 rounded-full transition-colors relative">
                        <IconBell size={20} />
                        <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div className="flex items-center gap-3 pl-4 border-l border-slate-200">
                        <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold border border-blue-200">
                            JD
                        </div>
                        <div className="hidden md:block text-sm">
                            <p className="font-semibold text-slate-800">Chef de Produit</p>
                            <p className="text-slate-500">Composants Électriques</p>
                        </div>
                    </div>
                </div>
            </header>
        );

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 p-6 ${className}`}>
                {children}
            </div>
        );

        // --- VUES ---

        const DashboardView = () => {
            const totalQ26 = MOCK_BIKES_DATA.reduce((sum, b) => sum + b.q26, 0);
            const totalQ27 = MOCK_BIKES_DATA.reduce((sum, b) => sum + b.q27, 0);
            const growth = ((totalQ27 - totalQ26) / totalQ26 * 100).toFixed(1);

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-end">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Vue d'ensemble</h1>
                            <p className="text-slate-500 mt-1">Résumé des intentions d'offre et macro-volumes.</p>
                        </div>
                        <button className="flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-lg font-medium hover:bg-blue-100 transition-colors">
                            <IconUpload size={18} />
                            Importer CSV
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-slate-500 font-medium">Vélos Actifs (Roadmap)</p>
                                    <h3 className="text-3xl font-bold text-slate-800 mt-2">{MOCK_BIKES_DATA.length}</h3>
                                </div>
                                <div className="p-3 bg-indigo-100 text-indigo-600 rounded-xl">
                                    <IconBike size={24} />
                                </div>
                            </div>
                        </Card>
                        
                        <Card>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-slate-500 font-medium">Volume Total 2026</p>
                                    <h3 className="text-3xl font-bold text-slate-800 mt-2">{totalQ26.toLocaleString('fr-FR')}</h3>
                                </div>
                                <div className="p-3 bg-emerald-100 text-emerald-600 rounded-xl">
                                    <IconBarChart3 size={24} />
                                </div>
                            </div>
                            <div className="mt-4 flex items-center text-sm">
                                <span className={`font-semibold ${growth >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>
                                    {growth >= 0 ? '+' : ''}{growth}%
                                </span>
                                <span className="text-slate-500 ml-2">vs 2025</span>
                            </div>
                        </Card>

                        <Card>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-slate-500 font-medium">Moteurs Différents</p>
                                    <h3 className="text-3xl font-bold text-slate-800 mt-2">
                                        {new Set(MOCK_BIKES_DATA.map(b => b.motor)).size}
                                    </h3>
                                </div>
                                <div className="p-3 bg-amber-100 text-amber-600 rounded-xl">
                                    <IconCpu size={24} />
                                </div>
                            </div>
                            <p className="text-slate-500 text-sm mt-4">Nécessite une convergence d'offre</p>
                        </Card>
                    </div>

                    <Card>
                        <h2 className="text-lg font-bold text-slate-800 mb-4">Aperçu des volumes par segment (2026)</h2>
                        <div className="h-12 w-full bg-slate-100 rounded-full overflow-hidden flex">
                            {['TREK', 'CITY', 'FOLD', 'MTB', 'ROAD', 'GRVL', 'KIDS'].map((sport, index) => {
                                const vol = MOCK_BIKES_DATA.filter(b => b.sport === sport).reduce((sum, b) => sum + b.q26, 0);
                                if (vol === 0) return null;
                                const percentage = (vol / totalQ26) * 100;
                                const colors = ['bg-blue-600', 'bg-emerald-500', 'bg-amber-500', 'bg-purple-500', 'bg-rose-500', 'bg-cyan-500'];
                                return (
                                    <div 
                                        key={sport} 
                                        style={{ width: `${percentage}%` }} 
                                        className={`${colors[index % colors.length]} h-full flex items-center justify-center text-xs text-white font-bold px-1 overflow-hidden whitespace-nowrap`}
                                        title={`${sport}: ${vol.toLocaleString()} (${percentage.toFixed(1)}%)`}
                                    >
                                        {percentage > 5 ? sport : ''}
                                    </div>
                                )
                            })}
                        </div>
                        <div className="flex flex-wrap gap-4 mt-4">
                            {['TREK', 'CITY', 'FOLD', 'MTB', 'ROAD', 'GRVL'].map((sport, index) => {
                                const colors = ['bg-blue-600', 'bg-emerald-500', 'bg-amber-500', 'bg-purple-500', 'bg-rose-500', 'bg-cyan-500'];
                                return (
                                    <div key={sport} className="flex items-center gap-2 text-sm text-slate-600">
                                        <div className={`w-3 h-3 rounded-full ${colors[index % colors.length]}`}></div>
                                        {sport}
                                    </div>
                                )
                            })}
                        </div>
                    </Card>
                </div>
            );
        };

        const RoadmapView = () => {
            return (
                <div className="space-y-6">
                    <div>
                        <h1 className="text-2xl font-bold text-slate-800">Roadmap Vélos</h1>
                        <p className="text-slate-500 mt-1">Cycle de vie des projets (SOP à EOP).</p>
                    </div>

                    <Card className="overflow-x-auto">
                        <div className="min-w-[800px]">
                            <div className="grid grid-cols-8 gap-4 border-b border-slate-200 pb-4 mb-4 text-sm font-semibold text-slate-500">
                                <div className="col-span-2">Modèle / Segment</div>
                                {YEARS.map(year => (
                                    <div key={year} className="text-center">{year}</div>
                                ))}
                            </div>
                            
                            <div className="space-y-4">
                                {MOCK_BIKES_DATA.map(bike => {
                                    const startIdx = YEARS.indexOf(bike.startYear);
                                    const endIdx = YEARS.indexOf(bike.endYear);
                                    
                                    return (
                                        <div key={bike.id} className="grid grid-cols-8 gap-4 items-center">
                                            <div className="col-span-2">
                                                <p className="font-bold text-slate-800 truncate" title={bike.name}>{bike.name}</p>
                                                <span className="text-xs px-2 py-0.5 bg-slate-100 text-slate-600 rounded-md border border-slate-200">
                                                    {bike.sport}
                                                </span>
                                            </div>
                                            
                                            <div className="col-span-6 relative h-8 bg-slate-50 rounded-lg">
                                                {startIdx !== -1 && (
                                                    <div 
                                                        className="absolute h-full bg-blue-500/20 border border-blue-500/50 rounded-lg flex items-center px-3"
                                                        style={{
                                                            left: `${(startIdx / 6) * 100}%`,
                                                            width: `${((Math.min(endIdx !== -1 ? endIdx : 5, 5) - startIdx + 1) / 6) * 100}%`
                                                        }}
                                                    >
                                                        <div className="w-full h-2 bg-blue-500 rounded-full"></div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };

        const ProjectionsView = () => {
            const [componentType, setComponentType] = useState('motor');
            
            const componentKeyMap = {
                motor: 'motor',
                battery: 'battery',
                display: 'display'
            };

            const keyToUse = componentKeyMap[componentType];

            const aggregatedData = useMemo(() => {
                const agg = {};
                MOCK_BIKES_DATA.forEach(bike => {
                    const compName = bike[keyToUse] || 'Non défini';
                    if (!agg[compName]) {
                        agg[compName] = { name: compName, q26: 0, q27: 0, q28: 0, q29: 0, q30: 0, q31: 0 };
                    }
                    agg[compName].q26 += bike.q26;
                    agg[compName].q27 += bike.q27;
                    agg[compName].q28 += bike.q28;
                    agg[compName].q29 += bike.q29;
                    agg[compName].q30 += bike.q30;
                    agg[compName].q31 += bike.q31;
                });
                return Object.values(agg).sort((a, b) => b.q26 - a.q26);
            }, [keyToUse]);

            const maxYearlyVolume = Math.max(...aggregatedData.flatMap(d => [d.q26, d.q27, d.q28, d.q29, d.q30, d.q31]));

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-end">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Projections Quantités</h1>
                            <p className="text-slate-500 mt-1">Besoins composants électriques par année.</p>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button 
                                onClick={() => setComponentType('motor')}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${componentType === 'motor' ? 'bg-white shadow text-blue-600' : 'text-slate-600 hover:text-slate-900'}`}
                            >
                                <IconCpu size={16} /> Moteurs (E-Kits)
                            </button>
                            <button 
                                onClick={() => setComponentType('battery')}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${componentType === 'battery' ? 'bg-white shadow text-emerald-600' : 'text-slate-600 hover:text-slate-900'}`}
                            >
                                <IconBattery size={16} /> Batteries
                            </button>
                            <button 
                                onClick={() => setComponentType('display')}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${componentType === 'display' ? 'bg-white shadow text-purple-600' : 'text-slate-600 hover:text-slate-900'}`}
                            >
                                <IconMonitorSmartphone size={16} /> Displays / HMI
                            </button>
                        </div>
                    </div>

                    <Card>
                        <div className="mb-6 flex items-center justify-between">
                            <h2 className="text-lg font-bold text-slate-800">Tendances Annuelles</h2>
                            <span className="text-sm text-slate-500">Données issues des BOMs et plans de vente</span>
                        </div>
                        
                        <div className="h-64 flex items-end gap-6 border-b border-slate-200 pb-2 mb-4">
                            {YEARS.map(year => {
                                const totalForYear = aggregatedData.reduce((sum, d) => sum + d[`q${year.toString().slice(-2)}`], 0);
                                const heightPercentage = maxYearlyVolume ? (totalForYear / (maxYearlyVolume * 1.5)) * 100 : 0;
                                
                                return (
                                    <div key={year} className="flex-1 flex flex-col items-center gap-2 group">
                                        <div className="w-full flex justify-center items-end h-full relative">
                                            <span className="absolute -top-6 text-xs font-bold text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity">
                                                {totalForYear.toLocaleString()}
                                            </span>
                                            <div 
                                                className={`w-full max-w-[60px] rounded-t-lg transition-all duration-500 ${
                                                    componentType === 'motor' ? 'bg-blue-500' : 
                                                    componentType === 'battery' ? 'bg-emerald-500' : 'bg-purple-500'
                                                }`}
                                                style={{ height: `${Math.max(heightPercentage, 2)}%` }}
                                            ></div>
                                        </div>
                                        <span className="text-sm font-medium text-slate-500">{year}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </Card>

                    <Card>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b border-slate-200">
                                        <th className="py-4 px-4 font-semibold text-slate-500">Composant ({componentType})</th>
                                        {YEARS.map(year => (
                                            <th key={year} className="py-4 px-4 font-semibold text-slate-500 text-right">{year}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {aggregatedData.map((row, idx) => (
                                        <tr key={idx} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                            <td className="py-4 px-4 font-medium text-slate-800">{row.name}</td>
                                            <td className="py-4 px-4 text-right text-slate-600">{row.q26.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-right text-slate-600">{row.q27.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-right text-slate-600">{row.q28.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-right text-slate-600">{row.q29.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-right text-slate-600">{row.q30.toLocaleString()}</td>
                                            <td className="py-4 px-4 text-right text-slate-600">{row.q31.toLocaleString()}</td>
                                        </tr>
                                    ))}
                                    <tr className="bg-slate-50 font-bold text-slate-800">
                                        <td className="py-4 px-4">TOTAL</td>
                                        {YEARS.map(year => (
                                            <td key={`tot-${year}`} className="py-4 px-4 text-right">
                                                {aggregatedData.reduce((sum, d) => sum + d[`q${year.toString().slice(-2)}`], 0).toLocaleString()}
                                            </td>
                                        ))}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        };

        const BikesView = () => {
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-end">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Base Vélos & Nomenclatures</h1>
                            <p className="text-slate-500 mt-1">Détail des configurations par modèle.</p>
                        </div>
                    </div>

                    <Card className="p-0 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-slate-50">
                                    <tr className="border-b border-slate-200">
                                        <th className="py-4 px-6 font-semibold text-slate-500">Vélo</th>
                                        <th className="py-4 px-6 font-semibold text-slate-500">Segment</th>
                                        <th className="py-4 px-6 font-semibold text-slate-500">Moteur / E-Kit</th>
                                        <th className="py-4 px-6 font-semibold text-slate-500">Batterie</th>
                                        <th className="py-4 px-6 font-semibold text-slate-500">Display / IHM</th>
                                        <th className="py-4 px-6 font-semibold text-slate-500 text-center">Statut</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {MOCK_BIKES_DATA.map((bike, idx) => (
                                        <tr key={idx} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                            <td className="py-4 px-6">
                                                <span className="font-bold text-slate-800 block">{bike.name}</span>
                                                <span className="text-xs text-slate-500">{bike.platform}</span>
                                            </td>
                                            <td className="py-4 px-6">
                                                <span className="px-2.5 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-semibold border border-slate-200">
                                                    {bike.sport}
                                                </span>
                                            </td>
                                            <td className="py-4 px-6 text-slate-700 font-medium">{bike.motor}</td>
                                            <td className="py-4 px-6 text-slate-700">{bike.battery}</td>
                                            <td className="py-4 px-6 text-slate-700">{bike.display}</td>
                                            <td className="py-4 px-6 text-center">
                                                <span className={`px-2 py-1 rounded-md text-xs font-bold ${bike.startYear <= 2026 ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>
                                                    {bike.startYear <= 2026 ? 'En Prod / Go' : `Prévu ${bike.startYear}`}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </Card>
                </div>
            );
        }

        const App = () => {
            const [activeTab, setActiveTab] = useState('projections');

            return (
                <div className="min-h-screen bg-slate-50 flex">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <div className="flex-1 ml-64 flex flex-col">
                        <Topbar />
                        
                        <main className="p-8 flex-1 overflow-y-auto">
                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'roadmap' && <RoadmapView />}
                            {activeTab === 'projections' && <ProjectionsView />}
                            {activeTab === 'bikes' && <BikesView />}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
